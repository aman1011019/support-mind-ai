<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <meta
      name="description"
      content="SupportMind is an AI-powered intelligent customer support platform with persistent customer memory."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <title>SupportMind | AI Customer Support Platform</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('supportmind_theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if ((saved && saved === 'dark') || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (error) {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
